name: Release

on:
  push:
    branches:
      - main
  # Manual kick (still passes through the same approval gate below).
  workflow_dispatch:

permissions:
  contents: read # for checkout

# Serialize release runs; never cancel one mid-publish.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # Ungated dry run: would the commits on main cut a release at all?
  # Reviewers are only asked to approve when the answer is yes, so routine
  # merges (docs, chores, refactors) don't ping anyone.
  plan:
    name: Plan (dry run)
    runs-on: ubuntu-latest
    permissions:
      contents: write # semantic-release verifies push access even in --dry-run
    outputs:
      new_release: ${{ steps.dry_run.outputs.new_release }}
      version: ${{ steps.dry_run.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Determine whether a release is due
        id: dry_run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -o pipefail
          output=$(pnpm exec semantic-release --dry-run 2>&1) || true
          echo "$output" | tail -n 25
          version=$(echo "$output" | grep -oE 'The next release version is [0-9]+\.[0-9]+\.[0-9]+([-.[:alnum:]]*)?' | awk '{print $NF}' | tail -n 1)
          if [ -n "$version" ]; then
            echo "new_release=true" >> "$GITHUB_OUTPUT"
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "Release due: v$version (awaiting approval)"
          else
            echo "new_release=false" >> "$GITHUB_OUTPUT"
            echo "No release-worthy commits — nothing to approve."
          fi

  # The actual release. The `release` environment holds the approval gate:
  # configure it once under Settings → Environments → release → "Required
  # reviewers". Until approved there, this job (and everything after it)
  # stays queued.
  release:
    name: Release v${{ needs.plan.outputs.version }} (on approval)
    needs: plan
    if: needs.plan.outputs.new_release == 'true'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write # to be able to publish a GitHub release
      issues: write # to be able to comment on released issues
      pull-requests: write # to be able to comment on released pull requests
      id-token: write # to enable use of OIDC for npm provenance
    outputs:
      publish_required: ${{ steps.semantic_release.outputs.publish_required }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Release
        id: semantic_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm exec semantic-release

  publish-tauri:
    needs: release
    if: ${{ needs.release.outputs.publish_required }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        # ubuntu-20.04 runners were retired by GitHub; 22.04 also matches the
        # Tauri v2 toolchain (webkit2gtk 4.1).
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      # The server sidecar compiles with `bun build --compile`
      # (packages/server/scripts/build-sidecar.mjs), invoked by Tauri's
      # beforeBuildCommand on every platform.
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: build packages
        run: pnpm run build

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__ # the action automatically replaces \_\_VERSION\_\_ with the app version
          releaseName: 'App v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false

name: Release

on:
  push:
    branches:
      - main
  # Manual kick (still passes through the same approval gate below).
  workflow_dispatch:

permissions:
  contents: read # for checkout

# Only ever process the latest push. A newer run supersedes (cancels) an older
# one that's still queued or parked at the approval gate, so an un-actioned
# approval can't hold the lock and silently cancel every push stacked behind it
# (which is exactly what stalled releases before). The gate therefore always
# reflects the tip of main. Trade-off: a push that lands while an *approved*
# release is actively publishing will cancel it — just re-run that release from
# the Actions tab on the rare occasion it happens.
concurrency:
  group: release
  cancel-in-progress: true

jobs:
  # Ungated dry run: would the commits on main cut a release at all?
  # Reviewers are only asked to approve when the answer is yes, so routine
  # merges (docs, chores, refactors) don't ping anyone. `nx release --dry-run`
  # makes no changes and needs no token.
  plan:
    name: Plan (dry run)
    runs-on: ubuntu-latest
    outputs:
      new_release: ${{ steps.plan.outputs.new_release }}
      version: ${{ steps.plan.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # nx reads conventional commits since the last v* tag
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Determine whether a release is due
        id: plan
        run: |
          set -o pipefail
          out=$(npx nx release --dry-run 2>&1) || true
          echo "$out" | grep -viE '^npm warn' | tail -n 30
          next=$(echo "$out" | grep -oiE 'new version [0-9]+\.[0-9]+\.[0-9]+' | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          current=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null | sed 's/^v//' || true)
          if [ -n "$next" ] && [ "$next" != "$current" ]; then
            echo "new_release=true" >> "$GITHUB_OUTPUT"
            echo "version=$next" >> "$GITHUB_OUTPUT"
            echo "Release due: v$next (awaiting approval)"
          else
            echo "new_release=false" >> "$GITHUB_OUTPUT"
            echo "No release-worthy commits — nothing to approve."
          fi

  # The actual release. The `release` environment holds the approval gate:
  # configure it once under Settings → Environments → release → "Required
  # reviewers". Until approved there, this job (and everything after it)
  # stays queued.
  #
  # `nx release` (fixed mode, see nx.json) bumps every package to the new
  # version, writes CHANGELOG.md, commits + tags `vX.Y.Z`, pushes both to main
  # (commit message carries [skip ci]; a GITHUB_TOKEN push can't re-trigger CI
  # anyway), and creates the GitHub release from the changelog. --skip-publish
  # leaves the npm step to the `publish-npm` job below, which ships the two
  # public libraries (@book.dev/sdk + @book.dev/ui); the rest stay private.
  release:
    name: Release v${{ needs.plan.outputs.version }} (on approval)
    needs: plan
    if: needs.plan.outputs.new_release == 'true'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write # push the version bump + tag, create the GitHub release
    outputs:
      version: ${{ needs.plan.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main # commit/tag land on the branch, not a detached HEAD
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Configure git identity for the release commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: nx release — version, changelog, tag, GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HUSKY: "0"
        run: npx nx release --skip-publish

  # Build the desktop bundles per-OS and attach them to the release nx just
  # created. Runs on the tag nx pushed, so tauri.conf.json's
  # "version": "../package.json" resolves to the bumped version.
  publish-tauri:
    name: Build & attach desktop bundles
    needs: [plan, release]
    permissions:
      contents: write # gh release upload
    strategy:
      fail-fast: false
      matrix:
        # Each leg pins an explicit Rust/Tauri target triple so the build output
        # path is uniform (`target/<triple>/release/bundle`).
        #
        # macOS ships PER-ARCH, not as a single universal binary: the bundled
        # `openbook-server` sidecar is a `bun build --compile` binary, and Bun
        # standalone executables can't be reliably lipo'd into a universal binary
        # (the JS payload is appended past the Mach-O). So we cut a native app +
        # native sidecar for each arch. Both macOS legs run on the arm64
        # macos-latest runner; the x86_64 leg cross-compiles (Rust via the added
        # target, the sidecar via Bun's --target). codesign/notarytool are
        # arch-agnostic, so signing the cross-built Intel app works fine here.
        #
        # ubuntu-20.04 runners were retired by GitHub; 22.04 also matches the
        # Tauri v2 toolchain (webkit2gtk 4.1).
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }} # the tag nx release pushed

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      # The server sidecar compiles with `bun build --compile`
      # (packages/server/scripts/build-sidecar.mjs), invoked by Tauri's
      # beforeBuildCommand on every platform.
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Adds the leg's target (e.g. x86_64-apple-darwin on the arm64 runner
          # for the Intel cross-build); a no-op when it's already the host.
          targets: ${{ matrix.target }}

      - name: install dependencies (ubuntu only)
        # libfuse2: linuxdeploy and its appimage plugin are themselves AppImages
        # and self-mount via FUSE; GitHub's ubuntu-22.04 image no longer ships it.
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf libfuse2

      - name: install frontend dependencies
        run: pnpm install --frozen-lockfile

      # `tauri build` runs its beforeBuildCommand first, which builds the sdk,
      # ui, server sidecar (for SIDECAR_TARGET, set below), and frontend before
      # bundling. (Same as the local `build:desktop` script, plus an explicit
      # --target.)
      - name: Build Tauri bundles
        # Force bash on every runner (incl. Windows Git Bash). The default
        # Windows shell is PowerShell, which parses the leading `@` in
        # `@book.dev/app` as its splatting operator and aborts with a ParserError.
        shell: bash
        env:
          # AppImage bundling hardening (Linux only; ignored elsewhere):
          #  - NO_STRIP: the ~80 MB Bun --compile sidecar has data appended past
          #    the ELF; linuxdeploy's strip step corrupts/fails on it.
          #  - APPIMAGE_EXTRACT_AND_RUN: run the linuxdeploy/appimagetool
          #    AppImages by self-extracting instead of FUSE-mounting.
          NO_STRIP: "true"
          APPIMAGE_EXTRACT_AND_RUN: "1"
          # Tell build-sidecar.mjs (run by Tauri's beforeBuildCommand) which arch
          # to compile the Bun sidecar for. It cross-compiles via Bun's --target
          # only when this differs from the runner's host arch (the Intel macOS
          # leg); otherwise it builds natively, unchanged.
          SIDECAR_TARGET: ${{ matrix.target }}
          # macOS code signing + notarization. Consumed only on the macOS legs;
          # on linux/windows these are unused env and harmless.
          #  - APPLE_CERTIFICATE/_PASSWORD: the base64 Developer ID Application
          #    .p12 + its password. The Tauri bundler imports this into an
          #    ephemeral keychain and auto-detects the signing identity from the
          #    cert, so no APPLE_SIGNING_IDENTITY is needed.
          #  - APPLE_ID/_PASSWORD/_TEAM_ID: notarization via the Apple ID method.
          #    APPLE_PASSWORD must be an app-specific password, not the account
          #    password. Present credentials => the .app is notarized + stapled.
          #  - KEYCHAIN_PASSWORD: only used by the tauri-action helper (the Tauri
          #    CI guide assumes it); the direct `tauri build` path here uses an
          #    ephemeral keychain and ignores it. Passed through for parity.
          # JIT entitlements for the Bun sidecar live in
          # packages/app/src-tauri/entitlements.plist (wired via tauri.conf.json).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ACCOUNT_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        # `tauri build --target <triple>` puts bundles under
        # target/<triple>/release/bundle. pnpm forwards the trailing args to the
        # app's `tauri` script.
        run: pnpm --filter @book.dev/app run tauri build --target ${{ matrix.target }}

      - name: Upload bundles to the v${{ needs.release.outputs.version }} release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${{ needs.release.outputs.version }}"
          # --target builds land under target/<triple>/release/bundle. The two
          # macOS legs produce arch-suffixed DMGs (…_aarch64.dmg / …_x64.dmg), so
          # they attach to the same release without clobbering each other.
          base="packages/app/src-tauri/target/${{ matrix.target }}/release/bundle"
          shopt -s nullglob
          files=(
            "$base"/dmg/*.dmg
            "$base"/macos/*.app.tar.gz
            "$base"/deb/*.deb
            "$base"/rpm/*.rpm
            "$base"/appimage/*.AppImage
            "$base"/msi/*.msi
            "$base"/nsis/*.exe
          )
          if [ ${#files[@]} -eq 0 ]; then
            echo "No bundles found under $base" >&2
            find "$base" -maxdepth 2 -type f 2>/dev/null >&2 || true
            exit 1
          fi
          printf 'Uploading to %s:\n' "$tag"; printf '  %s\n' "${files[@]}"
          gh release upload "$tag" "${files[@]}" --clobber

  # Ship the two PUBLIC libraries to npm at the version nx release just cut.
  # Every other package is `private: true`, so only @book.dev/sdk and
  # @book.dev/ui go out. Runs on the freshly-pushed tag, and only after the
  # approved `release` job (so it inherits that approval gate). sdk publishes
  # before ui because ui depends on it; each publish is skipped when that version
  # is already on the registry, so a re-run after a partial failure is safe.
  #
  # Auth: an npm *automation* token (these bypass publish-time 2FA) stored in the
  # `NPM_TOKEN` repo secret (Settings → Secrets and variables → Actions).
  publish-npm:
    name: Publish libraries to npm
    needs: [plan, release]
    if: needs.plan.outputs.new_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the release tag
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }} # the tag nx release pushed
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
          # Writes an .npmrc that authenticates with NODE_AUTH_TOKEN below.
          registry-url: "https://registry.npmjs.org"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build the libraries (sdk first; ui imports its types)
        run: |
          pnpm --filter @book.dev/sdk build
          pnpm --filter @book.dev/ui build
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          publish() {
            pkg="$1"; dir="$2"
            ver=$(node -p "require('./packages/$dir/package.json').version")
            if npm view "$pkg@$ver" version >/dev/null 2>&1; then
              echo "$pkg@$ver already on the registry — skipping."
            else
              echo "Publishing $pkg@$ver…"
              pnpm --filter "$pkg" publish --no-git-checks --access public
            fi
          }
          publish "@book.dev/sdk" sdk
          publish "@book.dev/ui" ui

name: CI
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # Build (libs) + typecheck + lint + unit tests + server e2e — the single gate
  # developers run locally as `pnpm verify`.
  verify:
    name: Verify (build · lint · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify
        run: pnpm run verify

  # Browser e2e against the web shell + Chromatic visual diffs.
  e2e:
    name: Playwright e2e + Chromatic
    runs-on: ubuntu-latest
    env:
      CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Chromatic needs git history for baselines
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build libs (Playwright servers resolve @open-book/* from dist)
        run: pnpm run build:libs
      - name: Install Playwright browsers
        run: pnpm --filter @open-book/web exec playwright install --with-deps chromium
      - name: Run Playwright e2e
        run: pnpm run test:e2e:web
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/web/playwright-report
          retention-days: 7
      # Visual diffs. Skipped automatically when the token secret isn't set.
      - name: Chromatic visual diffs
        if: ${{ env.CHROMATIC_PROJECT_TOKEN != '' }}
        run: pnpm run chromatic

[package]
name = "openbook-app"
version = "0.0.0"
description = "A Tauri App"
authors = ["you"]
license = ""
repository = ""
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0.128"
# The bundled TypeScript server (`@open-book/server`) is launched as a sidecar
# via the shell plugin (v2 moved `tauri::api::process` here).
tauri-plugin-shell = "2"

# macOS-only: force a "new tab" into the current window's native tab group via
# NSWindow.addTabbedWindow, instead of letting the system "Prefer tabs" setting
# decide (which otherwise opens it as a separate window).
[target.'cfg(target_os = "macos")'.dependencies]
objc2-app-kit = "0.3"
